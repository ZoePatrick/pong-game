<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Pong Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        canvas {
            border: 3px solid #fff;
        }
        .score {
            position: absolute;
            top: 20px;
            color: #fff;
            font-size: 32px;
            display: flex;
            gap: 100px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="score">
        <span id="playerScore">0</span>
        <span id="computerScore">0</span>
    </div>
    <canvas id="game" width="800" height="400"></canvas>
    <div class="controls">⬆️ ⬇️ Pfeiltasten zum Steuern</div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: 10
        };
        
        const player = {
            x: 10,
            y: canvas.height / 2 - 50,
            width: 15,
            height: 100,
            score: 0
        };
        
        const computer = {
            x: canvas.width - 25,
            y: canvas.height / 2 - 50,
            width: 15,
            height: 100,
            score: 0,
            speed: 4
        };
        
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = -ball.dx;
            ball.dy = (Math.random() - 0.5) * 10;
        }
        
        function update() {
            // Player movement
            if (keys['ArrowUp'] && player.y > 0) player.y -= 8;
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) player.y += 8;
            
            // Computer AI
            if (computer.y + computer.height / 2 < ball.y && computer.y < canvas.height - computer.height) {
                computer.y += computer.speed;
            } else if (computer.y + computer.height / 2 > ball.y && computer.y > 0) {
                computer.y -= computer.speed;
            }
            
            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Wall collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }
            
            // Player collision
            if (ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y && ball.y < player.y + player.height) {
                ball.dx = -ball.dx;
                ball.dx *= 1.05;
            }
            
            // Computer collision
            if (ball.x + ball.radius > computer.x &&
                ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.dx = -ball.dx;
                ball.dx *= 1.05;
            }
            
            // Scoring
            if (ball.x < 0) {
                computer.score++;
                document.getElementById('computerScore').textContent = computer.score;
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                document.getElementById('playerScore').textContent = player.score;
                resetBall();
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Middle line
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Player
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Computer
            ctx.fillStyle = '#f00';
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            
            // Ball
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        loop();
    </script>
</body>
</html>
